<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Digital Archive of Indigenous Knowledge">
  <title>Login - Indigenous Knowledge Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip to main content link for keyboard navigation -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header role="banner">
    <div class="container">
      <div class="header-content">
        <a href="/" class="logo" aria-label="Indigenous Knowledge Archive Home">Indigenous Knowledge Archive</a>
        <nav role="navigation" aria-label="Main navigation">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/archive">Archive</a></li>
            <li><a href="/login" aria-current="page">Login</a></li>
            <li><a href="/register">Register</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content" role="main">
    <section class="mt-xl mb-xl">
      <div class="container container-sm">
        <div class="card">
          <div class="card-header text-center">
            <h1>Welcome Back</h1>
            <p>Login to access the indigenous knowledge archive</p>
          </div>

          <div class="card-body">
            <!-- Error Message Container -->
            <div id="error-message" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

            <!-- Login Form -->
            <form id="login-form" aria-label="Login form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                  type="email" 
                  id="email" 
                  name="email" 
                  placeholder="Enter your email"
                  required
                  autocomplete="email"
                  aria-required="true"
                  aria-describedby="email-help"
                >
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <input 
                  type="password" 
                  id="password" 
                  name="password" 
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                  aria-required="true"
                >
              </div>

              <button type="submit" class="btn btn-primary btn-block" aria-label="Submit login form">
                Login
              </button>
            </form>
          </div>

          <div class="card-footer text-center">
            <p>Don't have an account? <a href="/register" aria-label="Go to registration page">Register here</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden" role="status" aria-live="polite" aria-label="Loading">
    <div class="loading"></div>
  </div>

  <!-- Footer -->
  <footer role="contentinfo">
    <div class="container">
      <p>&copy; 2024 Digital Archive of Indigenous Knowledge. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="js/ui.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>

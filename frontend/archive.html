<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse the Digital Archive of Indigenous Knowledge">
  <title>Archive - Indigenous Knowledge Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip to main content link for keyboard navigation -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header role="banner">
    <div class="container">
      <div class="header-content">
        <a href="/" class="logo" aria-label="Indigenous Knowledge Archive Home">Indigenous Knowledge Archive</a>
        <nav role="navigation" aria-label="Main navigation">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/archive" aria-current="page">Archive</a></li>
            <li><span id="user-name" style="color: var(--accent);" aria-label="Current user"></span></li>
            <li><a href="#" id="logout-btn" aria-label="Logout from your account">Logout</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content" role="main">
    <section class="mt-lg mb-xl">
      <div class="container">
        <h1 class="text-center mb-lg">Indigenous Knowledge Archive</h1>

        <!-- Search and Filter Section -->
        <div class="card mb-lg">
          <div class="card-body">
            <!-- Search Bar -->
            <div class="form-group">
              <label for="search-input" class="sr-only">Search archive content</label>
              <input 
                type="search" 
                id="search-input" 
                placeholder="Search by title or description..."
                aria-label="Search archive content"
                role="searchbox"
              >
            </div>

            <!-- Category Filters -->
            <div class="flex flex-wrap gap-sm mt-md" role="group" aria-label="Category filters">
              <button class="btn btn-outline btn-filter active" data-category="all" aria-pressed="true">
                All
              </button>
              <button class="btn btn-outline btn-filter" data-category="medicine" aria-pressed="false">
                Medicine
              </button>
              <button class="btn btn-outline btn-filter" data-category="agriculture" aria-pressed="false">
                Agriculture
              </button>
              <button class="btn btn-outline btn-filter" data-category="cultural" aria-pressed="false">
                Cultural
              </button>
              <button class="btn btn-outline btn-filter" data-category="heritage" aria-pressed="false">
                Heritage
              </button>
              <button class="btn btn-outline btn-filter" data-category="crafts" aria-pressed="false">
                Crafts
              </button>
            </div>
          </div>
        </div>

        <!-- Archive Content Grid -->
        <div id="archive-grid" class="grid grid-3" role="region" aria-label="Archive content" aria-live="polite">
          <!-- Content will be dynamically loaded here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center hidden mt-xl" role="status">
          <h3>No results found</h3>
          <p class="mt-md">Try adjusting your search or filter criteria</p>
          <button id="clear-filters-btn" class="btn btn-primary mt-md" aria-label="Clear all filters">
            Clear Filters
          </button>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="text-center mt-xl" role="status" aria-live="polite">
          <div class="loading"></div>
          <p class="mt-md">Loading archive content...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer role="contentinfo">
    <div class="container">
      <p>&copy; 2024 Digital Archive of Indigenous Knowledge. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/archive-page.js"></script>
</body>
</html>
